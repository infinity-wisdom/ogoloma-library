<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Ogoloma Library - Member Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface": "#f9f9ff",
                        "inverse-on-surface": "#ecf0ff",
                        "on-background": "#161c27",
                        "surface-container-high": "#e3e8f9",
                        "outline-variant": "#c4c6cf",
                        "on-tertiary-fixed": "#111c2c",
                        "on-surface": "#161c27",
                        "on-tertiary-container": "#99a4b9",
                        "secondary-fixed-dim": "#eec058",
                        "on-primary": "#ffffff",
                        "error": "#ba1a1a",
                        "on-primary-fixed-variant": "#2d486d",
                        "primary-container": "#1e3a5f",
                        "on-secondary-fixed": "#261a00",
                        "error-container": "#ffdad6",
                        "surface-container-lowest": "#ffffff",
                        "surface-dim": "#d4daea",
                        "surface-container-highest": "#dde2f3",
                        "background": "#f9f9ff",
                        "tertiary-container": "#2f3a4c",
                        "surface-container-low": "#f1f3ff",
                        "secondary": "#795900",
                        "primary-fixed": "#d5e3ff",
                        "surface-container": "#e8eeff",
                        "on-primary-container": "#8aa4cf",
                        "on-error": "#ffffff",
                        "tertiary-fixed-dim": "#bcc7dd",
                        "outline": "#74777f",
                        "secondary-fixed": "#ffdf9f",
                        "tertiary-fixed": "#d8e3fa",
                        "inverse-primary": "#adc8f5",
                        "tertiary": "#192435",
                        "on-surface-variant": "#43474e",
                        "on-tertiary-fixed-variant": "#3c475a",
                        "secondary-container": "#fece65",
                        "on-tertiary": "#ffffff",
                        "on-secondary": "#ffffff",
                        "inverse-surface": "#2a303d",
                        "on-primary-fixed": "#001c3b",
                        "surface-bright": "#f9f9ff",
                        "on-secondary-fixed-variant": "#5b4300",
                        "on-error-container": "#93000a",
                        "primary": "#022448",
                        "surface-tint": "#455f87",
                        "on-secondary-container": "#755700",
                        "primary-fixed-dim": "#adc8f5",
                        "surface-variant": "#dde2f3"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xs": "8px",
                        "margin-mobile": "16px",
                        "margin-desktop": "48px",
                        "xl": "32px",
                        "md": "16px",
                        "sm": "12px",
                        "lg": "24px",
                        "base": "4px",
                        "gutter": "24px"
                    },
                    "fontFamily": {
                        "headline-md": ["Inter", "sans-serif"],
                        "headline-sm": ["Inter", "sans-serif"],
                        "label-sm": ["Inter", "sans-serif"],
                        "headline-lg-mobile": ["Inter", "sans-serif"],
                        "body-md": ["Inter", "sans-serif"],
                        "headline-lg": ["Inter", "sans-serif"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "headline-sm": ["20px", { "lineHeight": "1.4", "fontWeight": "500" }],
                        "label-sm": ["14px", { "lineHeight": "1.4", "letterSpacing": "0.01em", "fontWeight": "300" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "1.2", "fontWeight": "700" }],

                        "headline-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }]

            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background min-h-screen flex items-center justify-center font-body-md text-on-surface antialiased p-margin-mobile md:p-margin-desktop relative overflow-hidden">
<!-- Decorative background elements -->
<div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0">
<div class="absolute -top-64 -left-64 w-[500px] h-[500px] bg-primary-fixed opacity-40 rounded-full blur-3xl"></div>
<div class="absolute bottom-[-20%] right-[-10%] w-[600px] h-[600px] bg-secondary-fixed opacity-30 rounded-full blur-3xl"></div>
</div>
<!-- Login Card Container -->
<main class="w-full max-w-[420px] bg-surface-container-lowest rounded-[12px] shadow-[0_4px_6px_-1px_rgba(0,0,0,0.1)] p-xl relative z-10 border border-surface-variant flex flex-col gap-lg">
<!-- Header -->
<div class="text-center flex flex-col items-center gap-sm">
<div class="w-16 h-16 bg-primary rounded-full flex items-center justify-center mb-xs shadow-sm">
<span class="material-symbols-outlined text-[32px] text-on-primary" data-icon="menu_book">menu_book</span>
</div>
<h1 class="font-headline-md text-headline-md text-primary">Ogoloma Library</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Member Login</p>
</div>
<!-- Form -->
<form action="#" class="flex flex-col gap-md" method="POST">
<!-- Registration Number Input -->
<div class="flex flex-col gap-base">
<label class="font-label-sm text-label-sm text-on-surface font-light" for="reg-number">Registration Number</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]" data-icon="badge">badge</span>
</div>
<input class="w-full pl-10 pr-sm py-sm bg-surface-container-lowest border border-outline-variant rounded-DEFAULT text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-shadow duration-200" id="reg-number" name="reg-number" placeholder="e.g. OGL-2023-0451" required="" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-base">
<label class="font-label-sm text-label-sm text-on-surface font-light" for="password">Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]" data-icon="lock">lock</span>
</div>
<input class="w-full pl-10 pr-10 py-sm bg-surface-container-lowest border border-outline-variant rounded-DEFAULT text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-shadow duration-200" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-sm flex items-center text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility_off">visibility_off</span>
</button>
</div>
</div>
<!-- Forgot Password Link -->
<div class="flex justify-end">
<a class="font-label-sm text-label-sm text-primary hover:text-primary-container transition-colors font-medium" href="#">Forgot Password?</a>
</div>
<!-- Submit Button -->
<button class="mt-sm w-full bg-primary text-on-primary font-headline-sm text-headline-sm py-sm px-lg rounded-[8px] hover:bg-primary-container transition-colors duration-200 flex items-center justify-center gap-xs shadow-sm active:scale-[0.98]" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="flex items-center gap-sm mt-xs">
<div class="flex-1 h-px bg-outline-variant/50"></div>
<span class="font-label-sm text-label-sm text-outline px-sm">OR</span>
<div class="flex-1 h-px bg-outline-variant/50"></div>
</div>
<!-- Register Link -->
<div class="text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                Don't have an account? 
                <a class="text-secondary font-medium hover:text-secondary-container transition-colors underline decoration-secondary/30 underline-offset-4 hover:decoration-secondary" href="register.html">Register here</a>
</p>
</div>
</main>
</body></html>
